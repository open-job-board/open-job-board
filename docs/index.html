<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Job Board - Browse Jobs</title>
  <meta name="description" content="Browse thousands of job listings. Search by keyword, filter by location, remote, employment type, and more.">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="./" class="logo">
        <div class="logo-icon"></div>
        Open Job Board
      </a>
      <button class="nav-toggle" onclick="document.querySelector('.site-header nav').classList.toggle('open')" aria-label="Toggle navigation">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
      </button>
      <nav>
        <a href="./" class="active">Jobs</a>
        <a href="docs/">Documentation</a>
        <a href="docs/api.html">API Explorer</a>
        <span class="nav-separator"></span>
        <a href="https://github.com/open-job-board/open-job-board">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- Search hero -->
    <section class="search-hero">
      <h1 class="search-hero-title">Find your next job</h1>
      <p class="search-hero-subtitle">Browse thousands of jobs from across the web. Powered by a free, open-source API.</p>
    </section>

    <!-- Search + Filters -->
    <form id="search-form" class="search-form">
      <div class="search-row">
        <input
          type="text"
          id="q"
          name="q"
          placeholder="Search by title, skill, or company..."
          class="search-input-main"
          autocomplete="off"
        >
        <button type="submit" class="btn btn-primary">Search</button>
      </div>

      <div class="filters-bar" id="filters-bar">
        <div class="filter-group">
          <label for="country">Country</label>
          <input type="text" id="country" placeholder="e.g. Germany">
        </div>
        <div class="filter-group">
          <label for="employment">Type</label>
          <select id="employment">
            <option value="">Any</option>
            <option value="full-time">Full-time</option>
            <option value="part-time">Part-time</option>
            <option value="contract">Contract</option>
            <option value="freelance">Freelance</option>
            <option value="internship">Internship</option>
          </select>
        </div>
        <div class="filter-group filter-group-checkbox">
          <label>
            <input type="checkbox" id="remote">
            Remote only
          </label>
        </div>
        <button type="button" class="btn btn-ghost btn-sm" id="clear-filters-btn">Clear filters</button>
      </div>
    </form>

    <!-- Status -->
    <div id="status" class="status-message" hidden></div>

    <!-- Results header -->
    <div id="results-header" class="results-header" hidden>
      <span id="results-count"></span>
    </div>

    <!-- Job list -->
    <div id="results" class="results-grid"></div>

    <!-- Pagination -->
    <div id="pagination" class="pagination" hidden>
      <button id="prev-btn" class="btn btn-secondary btn-sm" disabled>Previous</button>
      <span id="page-info"></span>
      <button id="next-btn" class="btn btn-secondary btn-sm">Next</button>
    </div>
  </main>

  <!-- Job detail modal -->
  <div id="job-modal" class="job-modal" hidden>
    <div class="job-modal-backdrop" id="modal-backdrop"></div>
    <div class="job-modal-content" id="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="job-modal-header">
        <h2 id="modal-title"></h2>
        <button class="job-modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="job-modal-body" id="modal-body"></div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p>Open Job Board &mdash; MIT License &mdash; <a href="https://github.com/open-job-board/open-job-board">GitHub</a> &mdash; <a href="docs/">API Docs</a></p>
    </div>
  </footer>

  <script src="assets/search.js"></script>
</body>
</html>
